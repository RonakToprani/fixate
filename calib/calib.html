<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fixate — calibrating</title>
    <script src="../lib/boot-guard.js"></script>
    <style>
      :root {
        --bg: #0a0e1a;
        --ink: #eef0ff;
        --muted: #8b90b5;
        --accent: #8f86ff;
        --danger: #ff6b7d;
      }
      * { box-sizing: border-box; }
      [hidden] { display: none !important; }
      html, body { margin: 0; height: 100%; }
      body {
        background: radial-gradient(600px 400px at 50% 40%, #1a1f3d 0%, var(--bg) 70%);
        color: var(--ink);
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; padding: 18px; overflow: hidden;
      }
      video { position: fixed; width: 2px; height: 2px; opacity: 0; top: 0; left: 0; }
      h1 { font-size: 16px; margin: 0 0 4px; font-weight: 800; }
      .sub { color: var(--muted); font-size: 12.5px; margin: 0 0 16px; max-width: 260px; }
      .stage {
        position: relative; width: 220px; height: 140px;
        border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
        background: rgba(255,255,255,0.02); margin-bottom: 14px;
      }
      .dot {
        position: absolute; left: 50%; top: 50%; width: 20px; height: 20px;
        margin: -10px 0 0 -10px; border-radius: 50%; background: var(--accent);
        animation: pulse 1.3s infinite ease-out;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(143,134,255,0.55); }
        100% { box-shadow: 0 0 0 22px rgba(143,134,255,0); }
      }
      .meta { display: flex; gap: 14px; color: var(--muted); font-size: 12px; }
      .err { color: var(--danger); font-size: 12.5px; margin-top: 8px; max-width: 260px; }
      button {
        margin-top: 12px; background: transparent; border: 1px solid rgba(255,255,255,0.14);
        color: var(--ink); border-radius: 9px; padding: 8px 14px; cursor: pointer; font-weight: 700;
      }
      button:hover { border-color: var(--accent); }
    </style>
  </head>
  <body>
    <video id="cam" playsinline muted></video>
    <h1 id="title">Getting ready…</h1>
    <p class="sub" id="sub">Look at the dot and hold your normal focused posture.</p>
    <div class="stage"><div class="dot"></div></div>
    <div class="meta">
      <span id="count">0 frames</span>
      <span id="timer">5.0s</span>
    </div>
    <p class="err" id="err" hidden></p>
    <button id="closeBtn" hidden>Close</button>
    <script type="module" src="calib.js"></script>
  </body>
</html>
