<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blocked — Fixate</title>
    <style>
      :root {
        --bg: #0a0e1a;
        --ink: #eef0ff;
        --muted: #8b90b5;
        --accent: #8f86ff;
        --good: #57d6a0;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: radial-gradient(1000px 700px at 50% -10%, #1a1f3d 0%, var(--bg) 60%);
        color: var(--ink);
        font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex; align-items: center; justify-content: center;
        text-align: center; padding: 24px;
      }
      .card { width: min(480px, 92vw); }
      .logo { font-size: 44px; color: var(--accent); }
      h1 { font-weight: 800; letter-spacing: 1px; margin: 12px 0 4px; }
      .site { color: var(--muted); font-size: 15px; margin-bottom: 18px; }
      .site b { color: var(--ink); }
      .line { font-size: 22px; font-weight: 800; margin: 18px 0; }
      .stats {
        display: flex; gap: 12px; justify-content: center; margin: 20px 0;
      }
      .stat {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 12px; padding: 14px 18px; min-width: 110px;
      }
      .stat b { display: block; font-size: 26px; }
      .stat span { color: var(--muted); font-size: 12px; }
      .focus b { color: var(--good); }
      .back {
        background: transparent; border: 1px solid rgba(255,255,255,0.14);
        color: var(--ink); border-radius: 10px; padding: 10px 16px;
        cursor: pointer; font-weight: 700; margin-top: 8px;
      }
      .back:hover { border-color: var(--accent); }
      .foot { color: var(--muted); font-size: 12px; margin-top: 18px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">◉</div>
      <h1>Blocked</h1>
      <div class="site">you tried to open <b id="site">a distraction</b></div>
      <div class="line" id="line">nice try.</div>
      <div class="stats">
        <div class="stat"><b id="timeLeft">—</b><span>left in session</span></div>
        <div class="stat focus"><b id="focus">—</b><span>focus so far</span></div>
      </div>
      <button class="back" onclick="history.length > 1 ? history.back() : window.close()">
        back to work
      </button>
      <div class="foot" id="foot">Fixate is blocking this for the rest of your session.</div>
    </div>
    <script type="module" src="blocked.js"></script>
  </body>
</html>
