<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fixate — background</title>
    <!-- This document is never shown. It holds the camera + gaze detection so a session
         can run without any visible tab or window. -->
  </head>
  <body>
    <video id="cam" playsinline muted></video>
    <!-- Preview capture resolution. Kept at the camera's native 4:3 so the dashboard
         preview is crisp rather than an upscaled thumbnail. -->
    <canvas id="frameCanvas" width="480" height="360"></canvas>
    <script type="module" src="offscreen.js"></script>
  </body>
</html>
